<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de display</title>

    <style>

        .caja{
            border: 2px solid black;
            margin: 10px;
            padding: 2px;
        }

        .block{
            display:block;
            background-color: rgb(255, 196, 196);
        }

        .diferente{
            width: 50vw;
        }

        /*coom
        DSFFDSD*/
        .inline{
            display: inline;
            background-color: aquamarine;
            width: 100px;
        }
    </style>
</head>
<body>


    <!-- Display BLOCK -->    
    <h1>Display block</h1>
    <span class="caja block">BLOCK</span>
    <span class="caja block">BLOCK</span>
    <span class="caja block diferente">BLOCK DIFERENTE</span>

    <!-- Display INLINE -->
    <h1>Display inline</h1>
    <span class="caja inline">INLINE</span>
    <span class="caja inline">INLINE</span>
    
</body>
</html>
